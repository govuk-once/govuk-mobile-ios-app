name: Sonar scan - PR

on:
  workflow_call:
    secrets:
      BW_ACCESS_TOKEN:
        description: 'A token to be used to fetch bit warden secrets'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-sonar
  cancel-in-progress: true

jobs:
  build:
    name: Sonar scan
    runs-on: macos-15

    steps:
      - name: Add path globally
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Get Secrets
        uses: bitwarden/sm-action@27c0c9dcab679d7250dbab91227c85b49ffa5e0f # pin@v3.3.0
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            74bca0cb-ffa4-4459-bb32-b32500f698b8 > SONAR_TOKEN

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pin@v6.0.3
        with:
          lfs: 'true'
          fetch-depth: 0

      - name: Download build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # pin@v8.0.1
        with:
          name: test-output
          path: test_output

      - name: Run SonarCloud Scanning
        run: |
          brew install sonar-scanner

          pull_number=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")

          sonar-scanner \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.coverageReportPaths="test_output/sonarqube-generic-coverage.xml" \
            -Dsonar.pullrequest.key=$pull_number \
            -Dsonar.pullrequest.branch=${{github.head_ref}} \
            -Dsonar.pullrequest.base=${{github.base_ref}} \
            -Dsonar.projectVersion=$(./Scripts/app_version.sh)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_SCANNER_OPTS: -Dorg.bouncycastle.pkcs12.ignore_useless_passwd=true
          SONAR_SCANNER_JAVA_OPTS: -Dorg.bouncycastle.pkcs12.ignore_useless_passwd=true

      - name: Check SonarCloud Results
        uses: sonarsource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # pin@v1.1.0
        # Force to fail step after specific time
        timeout-minutes: 5
